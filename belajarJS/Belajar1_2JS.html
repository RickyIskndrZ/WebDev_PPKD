<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="" method="post" onsubmit="return false;">
      <label for="">Masukan Nama Kota</label>
      <input type="text" id="kota" />
      <button onclick="jasaPengiriman()">Tes</button>
    </form>

    <p id="hasil"></p>

    <script>
      function jasaPengiriman() {
        let kota = document.querySelector('#kota').value;
        let berat = 10;
        let tarif = 0;

        if (kota === 'bogor') {
          tarif = 2000;
        } else if (kota === 'depok') {
          tarif = 4000;
        } else {
          tarif = 6000;
        }

        const total_harga = berat * tarif;

        document.querySelector('#hasil').innerHTML =
          `tarif kota = ${total_harga}`;
      }
    </script>
  </body>
</html>
