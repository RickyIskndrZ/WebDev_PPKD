<html>
  <head>
    <title>Form Pendaftaran</title>
    <!-- css: cascading style sheet
            internal, external and inline 
            inline css jarang digunakan karena kotor atau spagetti code-->
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        background-color: azure;
      }
      h2 {
        color: blue;
      }
      p {
        color: brown;
        font-size: 14px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 15px;
      }
      input {
        width: 25%;
        padding: 12px 12px;
        border-radius: 20px;
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }
      input[type="reset"] {
        width: 5%;
        padding: 12px 12px;
        border-radius: 20px;
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }
      input:focus {
        border-color: red;
      }
      .btn-reset {
        width: 20%;
        padding: 15px;
        background-color: red;
        color: black;
        border-color: white;
        border-radius: 10px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
      }
      .btn-sumbit {
        width: 10%;
        padding: 15px;
        background-color: greenyellow;
        color: white;
        border-color: white;
        border-radius: 10px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
      }
      .btn-sumbit:hover {
        background-color: aquamarine;
      }
      .btn-reset:hover {
        background-color: brown;
      }
    </style>
  </head>

  <body>
    <h2>Pendaftaran Siswa</h2>
    <p>
      <b>Silahkan Isi Data Diri Anda</b>
    </p>
    <form method="post" action="form.html">
      <div class="form-group">
        <label for="nama">Nama</label>
        <input type="text" placeholder="Masuka Nama" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" placeholder="Contoh: admin@gmail.com" required />
      </div>
      <div class="form-group">
        <label for="no.telp">No.Telp</label>
        <input type="text" placeholder="Nomor telepon +62" required />
      </div>
      <div class="form-group">
        <button type="submit" class="btn-sumbit">simpan</button>
        <input type="reset" class="btn-reset" value="batal" />
      </div>
    </form>
  </body>
</html>
